<div class="card card-h-100">
  <div class="card-header">
    <div class="row align-items-center">
      <div class="col">
        <h4 class="card-title">Atividades Recentes</h4>
      </div>
    </div>
  </div>
  <div class="card-body pt-0">
    <div class="table-responsive">
      <table class="table mb-0">
        <thead class="table-light">
          <tr>
            <th class="border-top-0">Tipo</th>
            <th class="border-top-0">Tópico</th>
            <th class="border-top-0">Pontuação</th>
            <th class="border-top-0">Duração</th>
          </tr>
        </thead>
        <tbody>
          @for (data of ActivityData; track $index) {
            <tr>
              <td>{{ data.type }}</td>
              <td>{{ data.topic }}</td>
              <td>{{ data.score }}</td>
              <td>{{ data.duration }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
