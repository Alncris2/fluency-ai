services:
  # ── Backend (PHP-FPM) ──────────────────────────────
  backend-app:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: fluency-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=fluency_ai_backend
      - DB_USERNAME=fluency
      - DB_PASSWORD=fluency_secret
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluency-network

  # ── Nginx (reverse proxy para PHP-FPM) ─────────────
  nginx:
    image: nginx:alpine
    container_name: fluency-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-app
    networks:
      - fluency-network

  # ── Frontend (Angular dev server) ───────────────────
  frontend-app:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: fluency-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fluency-network

  # ── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fluency-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fluency_ai_backend
      POSTGRES_USER: fluency
      POSTGRES_PASSWORD: fluency_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluency -d fluency_ai_backend"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fluency-network

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fluency-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fluency-network

  # ── Mailpit (email testing local) ───────────────────
  mailpit:
    image: axllent/mailpit
    container_name: fluency-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - fluency-network

volumes:
  postgres-data:
  redis-data:

networks:
  fluency-network:
    driver: bridge
