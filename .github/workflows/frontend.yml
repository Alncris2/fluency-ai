name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ng test + ESLint
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ['22.x']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ng test with coverage
        working-directory: frontend
        run: ng test --watch=false --code-coverage
        continue-on-error: false

      - name: Run ESLint linting
        working-directory: frontend
        run: ng lint --force --format=json > ../test-results/eslint-report.json || true
        continue-on-error: true

      - name: Check ESLint violations
        working-directory: frontend
        run: |
          if ! ng lint; then
            echo "⚠️ ESLint found code issues"
            echo "💡 Run 'ng lint' locally to review and fix issues"
            exit 1
          fi
          echo "✅ ESLint validation passed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results-node${{ matrix.node-version }}
          path: test-results/
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report-node${{ matrix.node-version }}
          path: frontend/coverage/
          retention-days: 30

      - name: Comment PR with test summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let comment = '## ✅ Frontend CI Summary\n\n';
            
            // Parse coverage report
            if (fs.existsSync('frontend/coverage/coverage-summary.json')) {
              try {
                const coverage = JSON.parse(fs.readFileSync('frontend/coverage/coverage-summary.json', 'utf8'));
                const total = coverage.total;
                comment += '### 📊 Coverage\n';
                comment += `| Metric | Coverage |\n`;
                comment += `|--------|----------|\n`;
                comment += `| Lines | ${total.lines.pct}% |\n`;
                comment += `| Branches | ${total.branches.pct}% |\n`;
                comment += `| Functions | ${total.functions.pct}% |\n`;
                comment += `| Statements | ${total.statements.pct}% |\n\n`;
              } catch (e) {
                comment += '⚠️ Could not parse coverage report\n\n';
              }
            }
            
            // Parse ESLint report
            if (fs.existsSync('test-results/eslint-report.json')) {
              try {
                const eslint = JSON.parse(fs.readFileSync('test-results/eslint-report.json', 'utf8'));
                let totalErrors = 0;
                let totalWarnings = 0;
                
                eslint.forEach(file => {
                  totalErrors += file.errorCount;
                  totalWarnings += file.warningCount;
                });
                
                comment += '### 🔍 ESLint\n';
                comment += `| Severity | Count |\n`;
                comment += `|----------|-------|\n`;
                comment += `| Errors | ${totalErrors} |\n`;
                comment += `| Warnings | ${totalWarnings} |\n\n`;
              } catch (e) {
                comment += '⚠️ Could not parse ESLint report\n\n';
              }
            }
            
            comment += '---\n';
            comment += '*Report generated by GitHub Actions*\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
